<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiSET Map Reading Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f0e8; --surface: #fdfaf4; --surface2: #ece8de;
  --border: #ddd8cc; --border2: #ccc7b8;
  --text: #1c1a14; --text2: #5c5848; --text3: #9c9888;
  --geo: #5a3d7a; --geo-light: #f0eaf8; --geo-mid: #9a6abf; --geo-border: #c0a0e0;
  --accent2: #c45a2a; --accent2-light: #faeee8;
  --accent3: #1f5f74; --accent3-light: #e6f1f4;
  --success-bg: #e8f5ee; --success-text: #1a5c3a; --success-border: #8ecfb0;
  --danger-bg: #faeaea; --danger-text: #7a2020; --danger-border: #e8b0b0;
  --radius: 10px; --radius-lg: 16px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5rem 1rem 5rem; line-height: 1.5; }
.container { max-width: 700px; margin: 0 auto; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); text-decoration: none; margin-bottom: 1.5rem; }
.back-link:hover { color: var(--geo); }

header { text-align: center; margin-bottom: 1.5rem; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
header h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 6vw, 2.6rem); font-weight: 400; line-height: 1.15; margin-bottom: 10px; }
header h1 em { font-style: italic; color: var(--geo); }
header p { font-size: 14px; color: var(--text2); }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.filter-btn { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text2); transition: all 0.14s; }
.filter-btn:hover { background: var(--surface2); }
.filter-btn.active { background: var(--geo); border-color: var(--geo); color: #fff; }
.filter-btn:focus-visible { outline: 2px solid var(--geo); outline-offset: 2px; }

.progress-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text3); margin-bottom: 0.6rem; }
.progress-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
.progress-fill { height: 100%; background: var(--geo-mid); border-radius: 99px; transition: width 0.25s; }

.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.4rem 1.4rem 1.5rem; }
.q-meta { display: flex; gap: 8px; margin-bottom: 0.9rem; flex-wrap: wrap; }
.q-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; background: var(--geo-light); color: var(--geo); border: 1px solid var(--geo-border); }
.q-prompt { font-size: 15px; font-weight: 500; margin-bottom: 1.1rem; line-height: 1.45; }

.chart-display { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.2rem; }
.map-caption { text-align: center; font-size: 12px; color: var(--text3); font-style: italic; margin-top: 8px; }

.map-key { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 0.9rem 1.1rem; max-width: 220px; margin: 0 auto; }
.map-key-title { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.map-key-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 6px; }
.map-key-row:last-child { margin-bottom: 0; }
.map-key-symbol { width: 18px; text-align: center; color: var(--geo); font-size: 14px; }

.road-map { position: relative; padding: 26px 6px 6px; }
.road-line { position: relative; height: 2px; background: var(--border2); margin: 28px 12% 42px; }
.town-dot { position: absolute; top: -4px; width: 10px; height: 10px; border-radius: 50%; transform: translateX(-50%); }
.town-label { position: absolute; top: 9px; font-size: 11.5px; color: var(--text2); transform: translateX(-50%); white-space: nowrap; font-weight: 500; }
.scale-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 4px; }
.scale-bar { width: 56px; height: 6px; background: var(--geo-mid); border-radius: 2px; }
.scale-label { font-size: 12px; color: var(--text2); }

.choropleth-row { display: flex; gap: 6px; }
.choropleth-cell { flex: 1; height: 70px; border-radius: var(--radius); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 12px; font-weight: 500; color: #fff; }
.choropleth-legend { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 12px; font-size: 11px; color: var(--text3); }
.choropleth-gradient { width: 90px; height: 8px; border-radius: 4px; background: linear-gradient(to right, #e8def0, #5a3d7a); }

.tz-row { display: flex; border-radius: var(--radius); overflow: hidden; }
.tz-half { flex: 1; padding: 1rem 0.5rem; text-align: center; }
.tz-half.west { background: var(--accent3-light); }
.tz-half.east { background: var(--geo-light); }
.tz-city { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.tz-sub { font-size: 11px; color: var(--text3); }
.tz-arrow-caption { text-align: center; font-size: 11.5px; color: var(--text3); margin-top: 10px; }

.choice-list { display: flex; flex-direction: column; gap: 8px; }
.choice-btn { display: block; width: 100%; text-align: left; padding: 11px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text); cursor: pointer; transition: all 0.12s; }
.choice-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--geo-border); }
.choice-btn:focus-visible { outline: 2px solid var(--geo); outline-offset: 2px; }
.choice-btn.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); font-weight: 500; }
.choice-btn.incorrect { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
.choice-btn:disabled { cursor: default; }

.explain-box { margin-top: 1rem; padding: 0.9rem 1rem; border-radius: var(--radius); background: var(--surface2); font-size: 13px; color: var(--text2); display: none; }
.explain-box.show { display: block; }
.explain-box strong { color: var(--text); }

.nav-row { display: flex; justify-content: flex-end; margin-top: 1.2rem; }
.btn { display: inline-block; padding: 10px 18px; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; text-decoration: none; border: 1px solid var(--border2); color: var(--text); background: var(--surface); cursor: pointer; transition: all 0.15s; }
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--geo); color: #fff; border-color: var(--geo); }
.btn.primary:hover { background: #4a3164; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn:focus-visible { outline: 2px solid var(--geo); outline-offset: 2px; }

.score-card { text-align: center; }
.score-big { font-family: 'Fraunces', serif; font-size: 3rem; color: var(--geo); }
.score-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.2rem; }
.score-breakdown { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 1.2rem; }
.score-cat-name { font-size: 10.5px; color: var(--text3); margin-bottom: 3px; }
.score-cat-num { font-size: 15px; font-weight: 500; color: var(--geo); }
.score-msg { font-size: 13.5px; color: var(--text2); margin-bottom: 1.3rem; }

footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 2.5rem; }

@media (prefers-reduced-motion: reduce) {
  .filter-btn, .choice-btn, .btn, .progress-fill { transition: none; }
}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="hiset_map_reading_guide.html">← Back to Map Reading Primer</a>

  <header>
    <div class="eyebrow">HiSET Social Studies · Geography</div>
    <h1>Map Reading <em>Practice</em></h1>
    <p>13 questions across map types, tools, coordinates, thematic maps, and drawing conclusions.</p>
  </header>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-f="all">All (13)</button>
    <button class="filter-btn" data-f="types">Map types</button>
    <button class="filter-btn" data-f="tools">Map tools</button>
    <button class="filter-btn" data-f="latlong">Lat &amp; long</button>
    <button class="filter-btn" data-f="thematic">Thematic maps</button>
    <button class="filter-btn" data-f="conclusions">Conclusions</button>
  </div>

  <div id="progressWrap">
    <div class="progress-row"><span id="progressText">Question 1 of 13</span><span id="progressScore">0 correct</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="q-container"></div>

  <footer>HiSET Map Reading Practice · Powered by Claude</footer>
</div>

<script>
var CAT_LABEL = { types: 'Map types', tools: 'Map tools', latlong: 'Lat & long', thematic: 'Thematic maps', conclusions: 'Conclusions' };

var cards = [
  { id:'m1', category:'types',
    html: null,
    questions: [
      { prompt: "A map shows national borders, capital cities, and the boundaries between states or provinces — but no landforms or data of any kind. What type of map is this?",
        choices: ["Physical map","Political map","Thematic map","Climate map"], answer: 1,
        explanation: "A political map's main purpose is to show human-made boundaries — countries, states, and capitals. A physical map would show landforms instead, and a thematic map would show data like population or climate." }
    ]
  },
  { id:'m2', category:'types',
    html: null,
    questions: [
      { prompt: "A map uses color shading to show the percentage of households below the poverty line in each U.S. county. What type of map is this?",
        choices: ["Road map","Political map","Thematic (choropleth) map","Historical map"], answer: 2,
        explanation: "Shading regions to represent a data value — like a percentage — is the defining feature of a thematic, or choropleth, map. It's built to compare data across places, not to show borders or routes." }
    ]
  },
  { id:'m3', category:'tools',
    html: '<div class="chart-display"><div class="map-key"><div class="map-key-title">Map Key</div><div class="map-key-row"><span class="map-key-symbol">★</span><span>State capital</span></div><div class="map-key-row"><span class="map-key-symbol">●</span><span>Other city</span></div><div class="map-key-row"><span class="map-key-symbol">▲</span><span>Mountain range</span></div></div></div>',
    questions: [
      { prompt: "Based on the map key above, what does the ▲ symbol represent on this map?",
        choices: ["A river","A capital city","A mountain range","A border crossing"], answer: 2,
        explanation: "The key directly pairs the ▲ symbol with \"Mountain range.\" On the real test, always check the key before answering — symbols are never universal across maps." }
    ]
  },
  { id:'m4', category:'tools',
    html: '<div class="chart-display"><div class="road-map"><div class="road-line"><span class="town-dot" style="left:14%;background:#5a3d7a"></span><span class="town-label" style="left:14%">Town A</span><span class="town-dot" style="left:78%;background:#c45a2a"></span><span class="town-label" style="left:78%">Town B</span></div><div class="scale-bar-wrap"><div class="scale-bar"></div><span class="scale-label">= 50 miles</span></div></div><div class="map-caption">The map distance between Town A and Town B is twice the length of the scale bar shown.</div></div>',
    questions: [
      { prompt: "Using the scale bar shown, about how far apart are Town A and Town B in real life?",
        choices: ["25 miles","50 miles","100 miles","150 miles"], answer: 2,
        explanation: "The scale bar represents 50 miles. The distance between the towns is twice the length of that bar, so 2 × 50 = 100 miles." }
    ]
  },
  { id:'m5', category:'tools',
    html: '<div class="chart-display"><svg viewBox="0 0 200 200" width="100%" height="200" style="max-width:280px;display:block;margin:0 auto;"><circle cx="100" cy="100" r="80" fill="none" stroke="#ccc7b8" stroke-width="1.5"/><line x1="100" y1="20" x2="100" y2="180" stroke="#ccc7b8" stroke-width="1"/><line x1="20" y1="100" x2="180" y2="100" stroke="#ccc7b8" stroke-width="1"/><text x="100" y="14" text-anchor="middle" font-size="13" fill="#1c1a14" font-family="DM Sans, sans-serif">N</text><text x="100" y="196" text-anchor="middle" font-size="13" fill="#1c1a14" font-family="DM Sans, sans-serif">S</text><text x="10" y="104" text-anchor="middle" font-size="13" fill="#1c1a14" font-family="DM Sans, sans-serif">W</text><text x="190" y="104" text-anchor="middle" font-size="13" fill="#1c1a14" font-family="DM Sans, sans-serif">E</text><circle cx="100" cy="100" r="6" fill="#5a3d7a"/><text x="100" y="86" text-anchor="middle" font-size="11" fill="#5a3d7a" font-family="DM Sans, sans-serif">Town A</text><circle cx="148" cy="148" r="6" fill="#c45a2a"/><text x="148" y="168" text-anchor="middle" font-size="11" fill="#c45a2a" font-family="DM Sans, sans-serif">Town B</text><circle cx="148" cy="52" r="6" fill="#1f5f74"/><text x="148" y="40" text-anchor="middle" font-size="11" fill="#1f5f74" font-family="DM Sans, sans-serif">Town C</text></svg></div>',
    questions: [
      { prompt: "Town B sits below and to the right of Town A on the map. Using the compass rose, what general direction is Town B from Town A?",
        choices: ["Northeast","Southeast","Southwest","Northwest"], answer: 1,
        explanation: "Below the center means south; to the right means east. Combined, that's southeast — exactly where Town B is drawn relative to Town A." },
      { prompt: "Town C sits above and to the right of Town A. What general direction is Town C from Town A?",
        choices: ["Northeast","Southeast","Southwest","Northwest"], answer: 0,
        explanation: "Above the center means north; to the right means east. Combined, that's northeast." }
    ]
  },
  { id:'m6', category:'latlong',
    html: '<div class="chart-display"><svg viewBox="0 0 260 180" width="100%" height="180" style="max-width:320px;display:block;margin:0 auto;"><line x1="40" y1="20" x2="40" y2="150" stroke="#ccc7b8"/><line x1="100" y1="20" x2="100" y2="150" stroke="#ccc7b8"/><line x1="160" y1="20" x2="160" y2="150" stroke="#ccc7b8"/><line x1="220" y1="20" x2="220" y2="150" stroke="#ccc7b8"/><line x1="20" y1="40" x2="240" y2="40" stroke="#ccc7b8"/><line x1="20" y1="80" x2="240" y2="80" stroke="#ccc7b8"/><line x1="20" y1="120" x2="240" y2="120" stroke="#ccc7b8"/><text x="40" y="165" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">120°W</text><text x="100" y="165" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">105°W</text><text x="160" y="165" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">90°W</text><text x="220" y="165" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">75°W</text><text x="14" y="44" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">50°N</text><text x="14" y="84" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">40°N</text><text x="14" y="124" text-anchor="middle" font-size="11" fill="#5c5848" font-family="DM Sans, sans-serif">30°N</text><circle cx="160" cy="80" r="6" fill="#5a3d7a"/><text x="160" y="65" text-anchor="middle" font-size="11.5" fill="#5a3d7a" font-family="DM Sans, sans-serif" font-weight="500">City X</text></svg><div class="map-caption">City X is located at the intersection of the 40°N and 90°W lines.</div></div>',
    questions: [
      { prompt: "Based on the grid above, which hemispheres is City X located in?",
        choices: ["Northern and Eastern","Northern and Western","Southern and Eastern","Southern and Western"], answer: 1,
        explanation: "City X is at 40°N (north of the equator, so Northern Hemisphere) and 90°W (west of the Prime Meridian, so Western Hemisphere)." },
      { prompt: "Which statement correctly describes the difference between latitude and longitude?",
        choices: ["Latitude lines run north-south and measure distance east or west of the Prime Meridian","Longitude lines run north-south and measure distance east or west of the Prime Meridian","Latitude and longitude both measure distance from the equator only","Longitude lines run east-west and measure distance north or south of the equator"], answer: 1,
        explanation: "Longitude lines (meridians) run pole to pole — north-south on the page — and measure how far east or west a point is from the Prime Meridian. Latitude lines (parallels) run east-west and measure distance from the equator." }
    ]
  },
  { id:'m7', category:'latlong',
    html: '<div class="chart-display"><div class="tz-row"><div class="tz-half west"><div class="tz-city">City Y</div><div class="tz-sub">one time zone west of City X</div></div><div class="tz-half east"><div class="tz-city">City X</div><div class="tz-sub">reference city</div></div></div><div class="tz-arrow-caption">← earlier clock time&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;later clock time →</div></div>',
    questions: [
      { prompt: "Lines of longitude are also used to define time zones. If it's 3:00 PM in City X, what time is it most likely in City Y, one time zone to the west?",
        choices: ["12:00 PM","2:00 PM","3:00 PM","4:00 PM"], answer: 1,
        explanation: "Moving west, clock time gets earlier by about one hour per time zone. 3:00 PM minus one hour is 2:00 PM." }
    ]
  },
  { id:'m8', category:'thematic',
    html: '<div class="chart-display"><div class="choropleth-row"><div class="choropleth-cell" style="background:#cdb9de">Region A</div><div class="choropleth-cell" style="background:#9a6abf">Region B</div><div class="choropleth-cell" style="background:#3d2a52">Region C</div><div class="choropleth-cell" style="background:#b09bcb">Region D</div></div><div class="choropleth-legend"><span>Lower %</span><div class="choropleth-gradient"></div><span>Higher %</span></div><div class="map-caption">Map shows % of electricity generated from renewable sources, by region. Darker shading = higher percentage.</div></div>',
    questions: [
      { prompt: "Which region has the highest percentage of electricity generated from renewable sources?",
        choices: ["Region A","Region B","Region C","Region D"], answer: 2,
        explanation: "Region C is shaded the darkest on the map, and the legend states that darker shading means a higher percentage." },
      { prompt: "Which conclusion is BEST supported by this map?",
        choices: ["Region C has lower energy costs than Region A","Region C generates a higher share of its electricity from renewable sources than Region A","Region C has passed more environmental laws than Region A","Region C has a smaller population than Region A"], answer: 1,
        explanation: "The map only shows one variable — the percentage of electricity from renewable sources. Costs, laws, and population aren't shown, so any conclusion about them goes beyond what the map actually supports." }
    ]
  },
  { id:'m9', category:'conclusions',
    html: null,
    questions: [
      { prompt: "Many major cities throughout history have developed where a river meets the ocean (a river's mouth). What is the BEST geographic explanation for this pattern?",
        choices: ["River mouths are usually the highest-elevation points in a region","Cities at a river's mouth can access both inland river trade and ocean shipping routes","River mouths have the mildest climate of any geographic feature","Ancient governments required all cities to be built near oceans"], answer: 1,
        explanation: "A river mouth connects inland trade routes (the river) with global trade routes (the ocean) — a major economic advantage that explains why so many cities grew there." }
    ]
  },
  { id:'m10', category:'conclusions',
    html: '<div class="chart-display"><svg viewBox="0 0 280 180" width="100%" height="180" style="max-width:320px;display:block;margin:0 auto;"><ellipse cx="150" cy="90" rx="95" ry="72" fill="#c45a2a" opacity="0.18" stroke="#c45a2a" stroke-width="2"/><ellipse cx="115" cy="95" rx="55" ry="42" fill="#5a3d7a" opacity="0.28" stroke="#5a3d7a" stroke-width="2" stroke-dasharray="5,4"/><text x="115" y="95" text-anchor="middle" font-size="11" fill="#5a3d7a" font-family="DM Sans, sans-serif" font-weight="500">1800</text><text x="205" y="45" text-anchor="middle" font-size="11" fill="#c45a2a" font-family="DM Sans, sans-serif" font-weight="500">1850</text></svg><div class="map-caption">Dashed outline: empire territory in 1800. Solid outline: empire territory in 1850.</div></div>',
    questions: [
      { prompt: "The map above shows one empire's territory in 1800 and again in 1850. Which conclusion is BEST supported by this map alone?",
        choices: ["The empire's economy grew stronger between 1800 and 1850","The empire expanded its territory between 1800 and 1850","The empire's population increased between 1800 and 1850","The empire had the strongest military in the world by 1850"], answer: 1,
        explanation: "The map only shows territorial boundaries at two points in time — it directly supports a conclusion about land area, not economy, population, or military strength. Those might all be true, but the map alone doesn't prove them." }
    ]
  },
  { id:'m11', category:'tools',
    html: null,
    questions: [
      { prompt: "A compass rose shows eight directions: N, NE, E, SE, S, SW, W, and NW. A town is located halfway between due north and due east of a city. Which direction is the town from the city?",
        choices: ["Northeast","Southeast","Southwest","Northwest"], answer: 0,
        explanation: "Halfway between north and east is northeast — one of the four intermediate directions on a compass rose." }
    ]
  }
];

var allQuestions = [];
cards.forEach(function(c){
  c.questions.forEach(function(q, i){
    allQuestions.push({ cardId: c.id, category: c.category, html: i === 0 ? c.html : null, prompt: q.prompt, choices: q.choices, answer: q.answer, explanation: q.explanation });
  });
});

var activeFilter = 'all';
var current = 0;
var answered = {};
var catCorrect = { types:0, tools:0, latlong:0, thematic:0, conclusions:0 };
var catTotal = { types:0, tools:0, latlong:0, thematic:0, conclusions:0 };
var totalCorrect = 0, totalAnswered = 0;

function filteredQuestions() {
  if (activeFilter === 'all') return allQuestions;
  return allQuestions.filter(function(q){ return q.category === activeFilter; });
}

document.getElementById('filterBar').addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  restart();
});

function render() {
  var qs = filteredQuestions();
  if (current >= qs.length) { renderScore(qs); return; }
  var q = qs[current];
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressText').textContent = 'Question ' + (current + 1) + ' of ' + qs.length;
  document.getElementById('progressScore').textContent = totalCorrect + ' correct';
  document.getElementById('progressFill').style.width = ((current) / qs.length * 100) + '%';

  var html = '<div class="q-card">';
  html += '<div class="q-meta"><span class="q-badge">' + CAT_LABEL[q.category] + '</span></div>';
  if (q.html) html += q.html;
  html += '<div class="q-prompt">' + q.prompt + '</div>';
  html += '<div class="choice-list" id="choiceList">';
  q.choices.forEach(function(c, i){
    html += '<button class="choice-btn" data-i="' + i + '" onclick="selectChoice(' + i + ')">' + c + '</button>';
  });
  html += '</div>';
  html += '<div class="explain-box" id="explainBox"><strong>Explanation:</strong> ' + q.explanation + '</div>';
  html += '<div class="nav-row"><button class="btn primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button></div>';
  html += '</div>';
  document.getElementById('q-container').innerHTML = html;
}

function selectChoice(i) {
  var qs = filteredQuestions();
  var q = qs[current];
  var key = q.cardId + '-' + current;
  if (answered[key] !== undefined) return;
  answered[key] = true;
  var buttons = document.querySelectorAll('#choiceList .choice-btn');
  buttons.forEach(function(b){ b.disabled = true; });
  buttons[i].classList.add(i === q.answer ? 'correct' : 'incorrect');
  if (i !== q.answer) buttons[q.answer].classList.add('correct');
  document.getElementById('explainBox').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
  totalAnswered++;
  catTotal[q.category]++;
  if (i === q.answer) { totalCorrect++; catCorrect[q.category]++; }
  document.getElementById('progressScore').textContent = totalCorrect + ' correct';
}

function nextQuestion() {
  current++;
  render();
}

function renderScore(qs) {
  var total = qs.length;
  var pct = total > 0 ? Math.round((totalCorrect / total) * 100) : 0;
  document.getElementById('progressWrap').style.display = 'none';
  var msg = pct >= 80 ? 'Excellent work \u2014 you have a strong handle on map reading!' :
            pct >= 60 ? 'Good effort! Review the explanations for any questions you missed.' :
            'Keep practicing \u2014 try the Map Reading Primer for extra support on tricky topics.';

  var breakdownHTML = '';
  if (activeFilter === 'all') {
    breakdownHTML = '<div class="score-breakdown">';
    ['types','tools','latlong','thematic','conclusions'].forEach(function(c){
      var sc = catTotal[c] > 0 ? catCorrect[c] + '/' + catTotal[c] : '\u2014';
      breakdownHTML += '<div><div class="score-cat-name">' + CAT_LABEL[c] + '</div><div class="score-cat-num">' + sc + '</div></div>';
    });
    breakdownHTML += '</div>';
  }

  document.getElementById('q-container').innerHTML =
    '<div class="q-card score-card">' +
    '<div class="score-big">' + totalCorrect + '/' + total + '</div>' +
    '<div class="score-sub">questions correct (' + pct + '%)</div>' +
    breakdownHTML +
    '<p class="score-msg">' + msg + '</p>' +
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
    '<button class="btn primary" onclick="restart()">Start over</button>' +
    '<button class="btn" onclick="window.location.href=\'hiset_map_reading_guide.html\'">Review the primer \u2192</button>' +
    '<button class="btn" onclick="window.location.href=\'hiset_social_studies_guide.html\'">Social Studies guide \u2192</button>' +
    '</div></div>';
}

function restart() {
  answered = {}; totalAnswered = 0; totalCorrect = 0;
  catCorrect = { types:0, tools:0, latlong:0, thematic:0, conclusions:0 };
  catTotal = { types:0, tools:0, latlong:0, thematic:0, conclusions:0 };
  current = 0;
  render();
}

render();
</script>
</body>
</html>
