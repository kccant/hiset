<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiSET Science — Variables Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f1ea;
  --surface: #fdfcf8;
  --surface2: #ede9e0;
  --border: #ddd8ce;
  --border2: #ccc7ba;
  --text: #1c1a16;
  --text2: #5c5850;
  --text3: #9c9890;
  --iv: #1e3d6e;
  --iv-light: #e6ecf6;
  --iv-mid: #4a72b8;
  --dv: #1a5c3a;
  --dv-light: #e6f2ec;
  --dv-mid: #4a9c72;
  --cv-light: #f1efe8;
  --cv-mid: #888780;
  --cv-dark: #444441;
  --success-bg: #e8f5ee;
  --success-text: #1a5c3a;
  --success-border: #a8d8bc;
  --danger-bg: #faeaea;
  --danger-text: #7a2020;
  --danger-border: #e8b0b0;
  --radius: 10px;
  --radius-lg: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem 1rem 5rem;
}

.container { max-width: 680px; margin: 0 auto; }

header { text-align: center; margin-bottom: 2rem; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
header h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 400; line-height: 1.15; margin-bottom: 10px; }
header h1 em { font-style: italic; color: var(--iv); }
header p { font-size: 14px; color: var(--text2); }

.ref-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.ref-pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--surface); font-size: 13px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-iv { background: var(--iv-mid); }
.dot-dv { background: var(--dv-mid); }
.dot-cv { background: var(--cv-mid); }
.ref-pill strong { font-weight: 500; }
.ref-pill span { color: var(--text2); }

.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.prog-wrap { flex: 1; height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--iv-mid); border-radius: 99px; transition: width 0.35s ease; }
.prog-label { font-size: 13px; color: var(--text3); white-space: nowrap; }

.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.q-meta { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
.experiment-box { background: var(--surface2); border-left: 3px solid var(--border2); padding: 12px 16px; margin-bottom: 1.25rem; font-size: 14px; line-height: 1.75; color: var(--text2); border-radius: 0 var(--radius) var(--radius) 0; }
.q-prompt { font-size: 15px; font-weight: 500; margin-bottom: 14px; }

.choices { display: flex; flex-direction: column; gap: 8px; }
.choice { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); text-align: left; transition: all 0.12s; line-height: 1.5; }
.choice:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); }
.choice.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); font-weight: 500; }
.choice.wrong { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
.choice:disabled { cursor: default; }
.choice-letter { font-size: 12px; font-weight: 500; width: 20px; flex-shrink: 0; opacity: 0.5; }

.feedback { display: none; margin-top: 12px; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; }
.feedback.show { display: block; }
.feedback.ok { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.feedback.no { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }

.var-breakdown { display: none; margin-top: 12px; }
.var-breakdown.show { display: block; }
.breakdown-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 8px; }
.var-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
.var-chip { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; }
.var-chip-iv { background: var(--iv-light); color: var(--iv); border: 1px solid #a0bcdc; }
.var-chip-dv { background: var(--dv-light); color: var(--dv); border: 1px solid #8ecfb0; }
.var-chip-cv { background: var(--cv-light); color: var(--cv-dark); border: 1px solid var(--border); }
.chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; margin-bottom: 4px; opacity: 0.75; }

.action-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn { padding: 9px 20px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); transition: all 0.14s; }
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--iv); color: #fff; border-color: var(--iv); }
.btn.primary:hover { background: #162d52; }

.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; }
.score-big { font-family: 'Fraunces', serif; font-size: 3.5rem; font-weight: 400; color: var(--iv); line-height: 1; margin-bottom: 8px; }
.score-sub { font-size: 15px; color: var(--text2); margin-bottom: 1rem; }
.score-msg { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; max-width: 400px; margin-left: auto; margin-right: auto; }

footer { text-align: center; margin-top: 3rem; font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">

  <header>
    <p class="eyebrow">HiSET Science · Scientific inquiry</p>
    <h1>Independent &amp; <em>Dependent</em> Variables</h1>
    <p>12 experiments · 24 questions · All three HiSET science areas</p>
  </header>

  <div class="ref-bar">
    <div class="ref-pill"><span class="dot dot-iv"></span><strong>Independent</strong> <span>— what you change</span></div>
    <div class="ref-pill"><span class="dot dot-dv"></span><strong>Dependent</strong> <span>— what you measure</span></div>
    <div class="ref-pill"><span class="dot dot-cv"></span><strong>Controlled</strong> <span>— what stays the same</span></div>
  </div>

  <div class="progress-row">
    <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <span class="prog-label" id="prog-label">0 / 16</span>
  </div>

  <div id="q-container"></div>

</div>

<footer>HiSET Science — Variables Practice &nbsp;·&nbsp; Powered by Claude</footer>

<script>
const Qs = [
  {
    topic: "Biology — plant growth",
    science: "Life Science",
    scenario: "A student wants to know if the amount of sunlight affects how tall bean plants grow. She places 5 plants in full sun, 5 in partial shade, and 5 in complete darkness. After 3 weeks, she measures the height of each plant.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Height of the plants", "Amount of sunlight each plant receives", "Type of plant used", "Amount of water given"], answer: 1 },
      { prompt: "What is the dependent variable?", choices: ["Amount of sunlight each plant receives", "Number of plants in each group", "Height of the plants after 3 weeks", "Type of soil used"], answer: 2 }
    ],
    breakdown: { iv: "Amount of sunlight (full sun / partial shade / darkness)", dv: "Height of the plants after 3 weeks", cv: "Plant type, soil, water amount, pot size, temperature" },
    explanation: "Sunlight is what the student deliberately changes (independent). Plant height is what she observes and measures as a result (dependent)."
  },
  {
    topic: "Chemistry — dissolving sugar",
    science: "Physical Science",
    scenario: "A scientist tests whether water temperature affects how quickly sugar dissolves. She stirs equal amounts of sugar into cups of water at 10°C, 25°C, 50°C, and 75°C, then times how many seconds it takes for all the sugar to disappear.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Amount of sugar added", "Time for sugar to dissolve", "Temperature of the water", "Type of container used"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Temperature of the water", "Time (seconds) for the sugar to dissolve", "Amount of sugar added", "Size of the cup"], answer: 1 }
    ],
    breakdown: { iv: "Water temperature (10°C, 25°C, 50°C, 75°C)", dv: "Time in seconds for sugar to fully dissolve", cv: "Amount of sugar, type of sugar, stirring speed, cup size" },
    explanation: "Temperature is intentionally varied (independent). The dissolving time is observed as a result and measured (dependent)."
  },
  {
    topic: "Physics — ramp height",
    science: "Physical Science",
    scenario: "Students investigate how the height of a ramp affects the speed of a toy car at the bottom. They release the same car from heights of 10 cm, 20 cm, 30 cm, and 40 cm, measuring the car's speed at the base of the ramp each time.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Speed of the car at the bottom", "Height of the ramp", "Mass of the car", "Length of the ramp surface"], answer: 1 },
      { prompt: "What is the dependent variable?", choices: ["Height of the ramp", "Mass of the toy car", "Speed of the car at the bottom of the ramp", "Material the ramp is made of"], answer: 2 }
    ],
    breakdown: { iv: "Height of the ramp (10, 20, 30, 40 cm)", dv: "Speed of the car at the base of the ramp", cv: "Car mass, ramp material, ramp length, surface texture" },
    explanation: "Ramp height is deliberately set at different values (independent). Car speed is what changes in response and gets measured (dependent)."
  },
  {
    topic: "Earth science — soil erosion",
    science: "Earth Science",
    scenario: "Researchers study whether the steepness of a slope affects how much soil erodes during a rainstorm. They build trays with slopes of 10°, 20°, 30°, and 45°, pour the same amount of water on each, and collect and weigh the soil that washes away.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Amount of water poured", "Weight of soil that washes away", "Steepness (angle) of the slope", "Type of tray used"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Steepness of the slope", "Amount of rainfall applied", "Weight of soil that washes away", "Size of the tray"], answer: 2 }
    ],
    breakdown: { iv: "Steepness/angle of the slope (10°, 20°, 30°, 45°)", dv: "Weight of soil washed away (erosion amount)", cv: "Amount of water, soil type, tray size, pour rate" },
    explanation: "The slope angle is what the researchers change on purpose (independent). The soil lost to erosion is the outcome they collect and measure (dependent)."
  },
  {
    topic: "Biology — antibiotics",
    science: "Life Science",
    scenario: "A microbiologist tests three different antibiotic concentrations (5 mg/L, 10 mg/L, 20 mg/L) on samples of the same bacteria. After 24 hours, she counts how many bacteria colonies are still alive in each dish.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Number of bacteria colonies remaining", "Type of bacteria used", "Antibiotic concentration (mg/L)", "Number of hours waited"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Antibiotic concentration", "Number of bacteria colonies surviving after 24 hours", "Type of antibiotic dish used", "Temperature of the lab"], answer: 1 }
    ],
    breakdown: { iv: "Antibiotic concentration (5, 10, 20 mg/L)", dv: "Number of bacteria colonies surviving after 24 hours", cv: "Bacteria type, dish size, incubation time, temperature" },
    explanation: "Concentration is the factor the scientist deliberately varies (independent). Bacterial survival count is what she observes changing as a result (dependent)."
  },
  {
    topic: "Physics — solar panel angle",
    science: "Physical Science",
    scenario: "An engineer wants to find out if the angle of a solar panel affects how much electricity it generates. She positions identical panels at 0°, 30°, 45°, 60°, and 90° to the sun and records the voltage output of each panel.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Voltage output of the panel", "Angle of the solar panel to the sun", "Type of solar panel used", "Time of day"], answer: 1 },
      { prompt: "What is the dependent variable?", choices: ["Angle of the solar panel", "Size of the solar panel", "Voltage (electricity) output", "Distance from the sun"], answer: 2 }
    ],
    breakdown: { iv: "Angle of the solar panel (0°, 30°, 45°, 60°, 90°)", dv: "Voltage output (electricity generated)", cv: "Panel type, panel size, distance from light source, time of day" },
    explanation: "The engineer deliberately sets the angle at different values (independent). The voltage generated in response is measured (dependent)."
  },
  {
    topic: "Biology — exercise & heart rate",
    science: "Life Science",
    scenario: "A PE teacher measures whether the intensity of exercise affects heart rate. Students walk, jog, and run for 5 minutes each, and the teacher records each student's heart rate immediately after each activity.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Heart rate after each activity", "Student's age or fitness level", "Exercise intensity (walk / jog / run)", "Duration of each activity"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Exercise intensity", "Duration of the activity (5 minutes)", "Heart rate measured after exercise", "Number of students"], answer: 2 }
    ],
    breakdown: { iv: "Exercise intensity (walking, jogging, running)", dv: "Heart rate (beats per minute) after each activity", cv: "Duration (5 min each), students tested, time between activities" },
    explanation: "Exercise intensity is deliberately changed between trials (independent). Heart rate is the physiological response that gets recorded (dependent)."
  },
  {
    topic: "Earth science — acid rain & seeds",
    science: "Earth & Life Science",
    scenario: "Scientists investigate acid rain's effect on seed germination. They water five groups of seeds daily with water at pH 7, pH 6, pH 5, pH 4, and pH 3. After 10 days, they count the number of seeds that have sprouted in each group.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Number of seeds that sprouted", "pH of the water used", "Number of days waited", "Type of seeds used"], answer: 1 },
      { prompt: "What is the dependent variable?", choices: ["pH level of the water", "Number of seeds planted per group", "Number of seeds that sprouted after 10 days", "Size of the containers"], answer: 2 }
    ],
    breakdown: { iv: "pH of the water (7, 6, 5, 4, 3 — simulating acid rain)", dv: "Number of seeds that germinated (sprouted) after 10 days", cv: "Seed type, seed count per group, watering amount, container size, light, temperature" },
    explanation: "The scientists deliberately set different pH levels (independent). Germination count is the outcome they observe and tally (dependent)."
  },
  {
    topic: "Physical science — temperature & reaction rate",
    science: "Physical Science",
    scenario: "A chemist wants to know if temperature affects how fast hydrogen peroxide breaks down. She places equal amounts of hydrogen peroxide in five beakers at 10°C, 20°C, 30°C, 40°C, and 50°C, and measures how many milliliters of oxygen gas are produced in 5 minutes.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Volume of oxygen gas produced", "Amount of hydrogen peroxide used", "Temperature of the hydrogen peroxide", "The 5-minute time period"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Temperature of the solution", "Volume of oxygen gas produced in 5 minutes", "Type of container used", "The chemist observing the reaction"], answer: 1 }
    ],
    breakdown: { iv: "Temperature of the hydrogen peroxide (10°C, 20°C, 30°C, 40°C, 50°C)", dv: "Volume of oxygen gas produced in 5 minutes (mL)", cv: "Amount of hydrogen peroxide, time measured, container size, type of solution" },
    explanation: "The chemist deliberately sets different temperatures (independent). The oxygen gas produced — the result of the reaction — is what gets measured (dependent)."
  },
  {
    topic: "Earth science — rock weathering",
    science: "Earth Science",
    scenario: "Geologists test whether the type of acid affects how quickly limestone rocks dissolve. They place identical limestone samples in beakers of hydrochloric acid, sulfuric acid, carbonic acid, and plain water, and measure the mass of rock lost after 24 hours.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Mass of rock lost after 24 hours", "Type of acid (or water) the rock is placed in", "Size of the limestone sample", "The 24-hour time period"], answer: 1 },
      { prompt: "What is the dependent variable?", choices: ["Type of acid used", "Mass of the limestone rock lost after 24 hours", "Temperature of the lab", "Size of the beakers"], answer: 1 }
    ],
    breakdown: { iv: "Type of liquid used (hydrochloric acid, sulfuric acid, carbonic acid, plain water)", dv: "Mass of rock lost (dissolved) after 24 hours", cv: "Limestone sample size, volume of liquid, temperature, time period" },
    explanation: "The type of acid is deliberately varied (independent). The amount of rock that dissolves — measured as mass lost — is the observed outcome (dependent)."
  },
  {
    topic: "Life science — antibiotic resistance",
    science: "Life Science",
    scenario: "A biologist studies whether bacteria exposed to low doses of antibiotics develop resistance faster than those exposed to high doses. She grows four groups of bacteria: no antibiotic, low dose, medium dose, and high dose. After two weeks, she tests each group to see how many bacteria survive a full-strength antibiotic dose.",
    questions: [
      { prompt: "What is the independent variable?", choices: ["Number of bacteria that survive the full-strength test", "The two-week growth period", "Antibiotic dose the bacteria were exposed to during growth", "The full-strength antibiotic used in the final test"], answer: 2 },
      { prompt: "What is the dependent variable?", choices: ["Antibiotic dose bacteria were exposed to during growth", "Number of bacteria surviving the full-strength antibiotic dose", "The type of bacteria used", "The length of the experiment"], answer: 1 }
    ],
    breakdown: { iv: "Antibiotic dose during growth period (none, low, medium, high)", dv: "Number of bacteria surviving the final full-strength antibiotic dose", cv: "Bacteria type, growth conditions, temperature, full-strength dose used in final test, time period" },
    explanation: "The antibiotic exposure level during growth is deliberately varied (independent). Survival rate in the final test is what's measured to determine if resistance developed (dependent)."
  }
];

const TOTAL = Qs.reduce((s, e) => s + e.questions.length, 0);
let expIndex = 0, qIndex = 0, answered = {}, totalAnswered = 0, totalCorrect = 0;

function updateProgress() {
  document.getElementById('prog').style.width = (totalAnswered / TOTAL * 100) + '%';
  document.getElementById('prog-label').textContent = totalAnswered + ' / ' + TOTAL;
}

function render() {
  updateProgress();
  if (expIndex >= Qs.length) { renderFinal(); return; }
  const exp = Qs[expIndex];
  const q = exp.questions[qIndex];
  const key = expIndex + '-' + qIndex;
  const ans = answered[key];

  let html = '<div class="q-card">';
  html += '<div class="q-meta">Question ' + (expIndex * 2 + qIndex + 1) + ' of ' + TOTAL + ' &nbsp;·&nbsp; ' + exp.topic + ' &nbsp;·&nbsp; ' + exp.science + '</div>';
  html += '<div class="experiment-box">' + exp.scenario + '</div>';
  html += '<div class="q-prompt">' + q.prompt + '</div>';
  html += '<div class="choices">';
  q.choices.forEach((c, ci) => {
    let cls = 'choice';
    if (ans !== undefined) {
      if (ci === q.answer) cls += ' correct';
      else if (ci === ans) cls += ' wrong';
    }
    html += '<button class="' + cls + '"' + (ans !== undefined ? ' disabled' : '') + ' onclick="pick(' + ci + ')">';
    html += '<span class="choice-letter">' + String.fromCharCode(65 + ci) + '</span>' + c + '</button>';
  });
  html += '</div>';

  if (ans !== undefined) {
    const ok = ans === q.answer;
    html += '<div class="feedback show ' + (ok ? 'ok' : 'no') + '">' + (ok ? '✓ Correct! ' : '✗ Not quite — ') + exp.explanation + '</div>';
    html += '<div class="var-breakdown show"><div class="breakdown-label">Full variable breakdown</div><div class="var-grid">';
    html += '<div class="var-chip var-chip-iv"><div class="chip-label">Independent</div>' + exp.breakdown.iv + '</div>';
    html += '<div class="var-chip var-chip-dv"><div class="chip-label">Dependent</div>' + exp.breakdown.dv + '</div>';
    html += '<div class="var-chip var-chip-cv"><div class="chip-label">Controlled</div>' + exp.breakdown.cv + '</div>';
    html += '</div></div>';
    html += '<div class="action-row">';
    if (qIndex < exp.questions.length - 1) html += '<button class="btn primary" onclick="nextQ()">Next question →</button>';
    else if (expIndex < Qs.length - 1) html += '<button class="btn primary" onclick="nextExp()">Next experiment →</button>';
    else html += '<button class="btn primary" onclick="showFinal()">See my score →</button>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('q-container').innerHTML = html;
}

function pick(ci) {
  const key = expIndex + '-' + qIndex;
  if (answered[key] !== undefined) return;
  answered[key] = ci;
  totalAnswered++;
  if (ci === Qs[expIndex].questions[qIndex].answer) totalCorrect++;
  render();
}

function nextQ() { qIndex++; render(); }
function nextExp() { expIndex++; qIndex = 0; render(); }
function showFinal() { expIndex = Qs.length; render(); }

function renderFinal() {
  const pct = Math.round(totalCorrect / TOTAL * 100);
  const msg = pct >= 80 ? 'Strong work — you have a solid grasp of experimental variables!' :
              pct >= 60 ? 'Good effort! Review the variable breakdowns to sharpen your skills.' :
              'Keep practicing! Ask yourself: what did they change? What did they measure?';
  document.getElementById('q-container').innerHTML =
    '<div class="score-card">' +
    '<div class="score-big">' + totalCorrect + '/' + TOTAL + '</div>' +
    '<div class="score-sub">questions correct &nbsp;(' + pct + '%)</div>' +
    '<p class="score-msg">' + msg + '</p>' +
    '<button class="btn primary" onclick="restart()">Start over</button>' +
    '</div>';
}

function restart() {
  expIndex = 0; qIndex = 0; answered = {}; totalAnswered = 0; totalCorrect = 0; render();
}

render();
</script>
</body>
</html>
