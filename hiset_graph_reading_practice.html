<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiSET Graph & Data Reading Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f1efe9; --surface: #fbfaf6; --surface2: #e7e2d4;
  --border: #d9d2bf; --border2: #c2b89e;
  --text: #221f1a; --text2: #5a5650; --text3: #8a8579;
  --sci: #1a5c3a; --sci-light: #e6f2ec; --sci-border: #8ecfb0;
  --ss: #c45a2a; --ss-light: #f5e8e0; --ss-border: #e0b08c;
  --success-bg: #e6f2ec; --success-text: #1a5c3a; --success-border: #8ecfb0;
  --danger-bg: #faeaea; --danger-text: #7a2020; --danger-border: #e8b0b0;
  --radius: 10px; --radius-lg: 16px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5rem 1rem 5rem; }
.container { max-width: 700px; margin: 0 auto; }
header { text-align: center; margin-bottom: 1.75rem; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
header h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(1.6rem, 5.5vw, 2.5rem); line-height: 1.2; margin-bottom: 10px; }
header h1 em { font-style: italic; color: var(--ss); }
header p { font-size: 14px; color: var(--text2); max-width: 500px; margin: 0 auto; }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.25rem; }
.filter-btn { padding: 7px 16px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all .15s; }
.filter-btn:hover { border-color: var(--border2); }
.filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
.filter-btn:focus-visible { outline: 2px solid var(--sci); outline-offset: 2px; }

.progress-wrap { margin-bottom: 1.75rem; }
.progress-label { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 6px; }
.progress-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--ss); border-radius: 99px; transition: width .3s ease; }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1.25rem; }
.chart-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.cat-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 99px; letter-spacing: .02em; }
.cat-badge.sci { background: var(--sci-light); color: var(--sci); border: 1px solid var(--sci-border); }
.cat-badge.ss { background: var(--ss-light); color: var(--ss); border: 1px solid var(--ss-border); }
.chart-type-tag { font-size: 11px; color: var(--text3); border: 1px solid var(--border); padding: 4px 10px; border-radius: 99px; }
.chart-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 19px; color: var(--text); margin-bottom: 14px; }

.chart-display { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 4px; }
.chart-svg { width: 100%; height: auto; display: block; }
.gridline { stroke: var(--border2); stroke-width: 1; }
.axis-line { stroke: var(--text3); stroke-width: 1.2; }
.axis-label { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: var(--text2); }
.axis-unit { font-family: 'DM Sans', sans-serif; font-size: 10px; fill: var(--text3); font-style: italic; }

.pie-wrap { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; justify-content: center; padding: 8px 4px; }
.pie { width: 150px; height: 150px; border-radius: 50%; flex-shrink: 0; }
.legend { display: flex; flex-direction: column; gap: 7px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-label { flex: 1; min-width: 110px; }
.legend-val { font-weight: 500; color: var(--text2); }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { border: 1px solid var(--border); padding: 8px 10px; text-align: center; }
.data-table th { background: var(--surface2); font-weight: 500; }

.question-block { margin-top: 1.75rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.q-prompt { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn { text-align: left; padding: 11px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all .15s; }
.choice-btn:hover:not(:disabled) { border-color: var(--border2); background: var(--surface2); }
.choice-btn:focus-visible { outline: 2px solid var(--sci); outline-offset: 2px; }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); font-weight: 500; }
.choice-btn.incorrect { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }

.feedback { margin-top: 10px; padding: 12px 14px; border-radius: var(--radius); font-size: 13.5px; line-height: 1.5; }
.feedback.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.feedback.danger { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }

.nav-row { display: flex; justify-content: flex-end; margin-top: 1.25rem; }
.btn { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 20px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; }
.btn:hover:not(:disabled) { border-color: var(--border2); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
.btn:focus-visible { outline: 2px solid var(--sci); outline-offset: 2px; }

.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.25rem 1.75rem; text-align: center; }
.score-big { font-family: 'Fraunces', serif; font-size: 3rem; color: var(--ss); margin-bottom: 4px; }
.score-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.score-breakdown { display: flex; justify-content: center; gap: 28px; margin-bottom: 20px; flex-wrap: wrap; }
.score-cat-name { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
.score-cat-num { font-family: 'Fraunces', serif; font-size: 22px; }
.score-msg { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

@media (max-width: 480px) { .chart-card { padding: 1.25rem; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">HiSET Science &amp; Social Studies</div>
    <h1>Ten charts, twenty questions, <em>one skill: reading data.</em></h1>
    <p>Bar graphs, line graphs, pie charts, and data tables — the same data-reading skill the real HiSET tests in both subjects, with instant feedback on every answer.</p>
  </header>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All charts</button>
    <button class="filter-btn" data-filter="sci">Science</button>
    <button class="filter-btn" data-filter="ss">Social Studies</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">Chart 1 of 10</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div id="q-container"></div>
</div>

<script>
const charts = [
  {
    id: 'c1', category: 'sci', type: 'Line graph',
    title: 'Average Daily High Temperature, One Week',
    html: `<div class="chart-display"><svg viewBox="0 0 460 260" xmlns="http://www.w3.org/2000/svg" class="chart-svg" role="img"><line x1="46" y1="226.0" x2="446" y2="226.0" class="gridline"/><text x="38" y="230.0" class="axis-label" text-anchor="end">45</text><line x1="46" y1="191.0" x2="446" y2="191.0" class="gridline"/><text x="38" y="195.0" class="axis-label" text-anchor="end">50</text><line x1="46" y1="156.0" x2="446" y2="156.0" class="gridline"/><text x="38" y="160.0" class="axis-label" text-anchor="end">55</text><line x1="46" y1="121.0" x2="446" y2="121.0" class="gridline"/><text x="38" y="125.0" class="axis-label" text-anchor="end">60</text><line x1="46" y1="86.0" x2="446" y2="86.0" class="gridline"/><text x="38" y="90.0" class="axis-label" text-anchor="end">65</text><line x1="46" y1="51.0" x2="446" y2="51.0" class="gridline"/><text x="38" y="55.0" class="axis-label" text-anchor="end">70</text><line x1="46" y1="16.0" x2="446" y2="16.0" class="gridline"/><text x="38" y="20.0" class="axis-label" text-anchor="end">75</text><line x1="46" y1="16" x2="46" y2="226" class="axis-line"/><line x1="46" y1="226" x2="446" y2="226" class="axis-line"/><polyline points="46.0,191.0 112.7,191.0 179.3,156.0 246.0,156.0 312.7,86.0 379.3,51.0 446.0,86.0" fill="none" stroke="#1a5c3a" stroke-width="2.5"/><circle cx="46.0" cy="191.0" r="4" fill="#1a5c3a"/><text x="46.0" y="244" class="axis-label" text-anchor="middle">Mon</text><circle cx="112.7" cy="191.0" r="4" fill="#1a5c3a"/><text x="112.7" y="244" class="axis-label" text-anchor="middle">Tue</text><circle cx="179.3" cy="156.0" r="4" fill="#1a5c3a"/><text x="179.3" y="244" class="axis-label" text-anchor="middle">Wed</text><circle cx="246.0" cy="156.0" r="4" fill="#1a5c3a"/><text x="246.0" y="244" class="axis-label" text-anchor="middle">Thu</text><circle cx="312.7" cy="86.0" r="4" fill="#1a5c3a"/><text x="312.7" y="244" class="axis-label" text-anchor="middle">Fri</text><circle cx="379.3" cy="51.0" r="4" fill="#1a5c3a"/><text x="379.3" y="244" class="axis-label" text-anchor="middle">Sat</text><circle cx="446.0" cy="86.0" r="4" fill="#1a5c3a"/><text x="446.0" y="244" class="axis-label" text-anchor="middle">Sun</text><text x="46" y="11" class="axis-unit">°F</text></svg></div>`,
    questions: [
      { prompt: "What was the high temperature on Friday?", choices: ["55°F", "60°F", "65°F", "70°F"], answer: 2,
        explanation: "Reading across to Friday and up to the line, the point lines up with the 65°F gridline." },
      { prompt: "Between which two consecutive days did the temperature rise the most?", choices: ["Monday to Tuesday", "Wednesday to Thursday", "Thursday to Friday", "Saturday to Sunday"], answer: 2,
        explanation: "Thursday was 55°F and Friday was 65°F — a 10-degree jump, larger than any other change between consecutive days on the graph." }
    ]
  },
  {
    id: 'c2', category: 'sci', type: 'Bar graph',
    title: 'Reaction Time at Different Temperatures',
    html: `<div class="chart-display"><svg viewBox="0 0 460 260" xmlns="http://www.w3.org/2000/svg" class="chart-svg" role="img"><line x1="46" y1="226.0" x2="446" y2="226.0" class="gridline"/><text x="38" y="230.0" class="axis-label" text-anchor="end">0</text><line x1="46" y1="202.7" x2="446" y2="202.7" class="gridline"/><text x="38" y="206.7" class="axis-label" text-anchor="end">10</text><line x1="46" y1="179.3" x2="446" y2="179.3" class="gridline"/><text x="38" y="183.3" class="axis-label" text-anchor="end">20</text><line x1="46" y1="156.0" x2="446" y2="156.0" class="gridline"/><text x="38" y="160.0" class="axis-label" text-anchor="end">30</text><line x1="46" y1="132.7" x2="446" y2="132.7" class="gridline"/><text x="38" y="136.7" class="axis-label" text-anchor="end">40</text><line x1="46" y1="109.3" x2="446" y2="109.3" class="gridline"/><text x="38" y="113.3" class="axis-label" text-anchor="end">50</text><line x1="46" y1="86.0" x2="446" y2="86.0" class="gridline"/><text x="38" y="90.0" class="axis-label" text-anchor="end">60</text><line x1="46" y1="62.7" x2="446" y2="62.7" class="gridline"/><text x="38" y="66.7" class="axis-label" text-anchor="end">70</text><line x1="46" y1="39.3" x2="446" y2="39.3" class="gridline"/><text x="38" y="43.3" class="axis-label" text-anchor="end">80</text><line x1="46" y1="16.0" x2="446" y2="16.0" class="gridline"/><text x="38" y="20.0" class="axis-label" text-anchor="end">90</text><line x1="46" y1="16" x2="46" y2="226" class="axis-line"/><line x1="46" y1="226" x2="446" y2="226" class="axis-line"/><rect x="66.0" y="39.3" width="40.0" height="186.7" fill="#1a5c3a" rx="3"/><text x="86.0" y="244" class="axis-label" text-anchor="middle">10°C</text><rect x="146.0" y="86.0" width="40.0" height="140.0" fill="#1a5c3a" rx="3"/><text x="166.0" y="244" class="axis-label" text-anchor="middle">20°C</text><rect x="226.0" y="132.7" width="40.0" height="93.3" fill="#1a5c3a" rx="3"/><text x="246.0" y="244" class="axis-label" text-anchor="middle">30°C</text><rect x="306.0" y="156.0" width="40.0" height="70.0" fill="#1a5c3a" rx="3"/><text x="326.0" y="244" class="axis-label" text-anchor="middle">40°C</text><rect x="386.0" y="179.3" width="40.0" height="46.7" fill="#1a5c3a" rx="3"/><text x="406.0" y="244" class="axis-label" text-anchor="middle">50°C</text><text x="46" y="11" class="axis-unit">seconds</text></svg></div>`,
    questions: [
      { prompt: "How many seconds did the reaction take to complete at 30°C?", choices: ["20 seconds", "30 seconds", "40 seconds", "50 seconds"], answer: 2,
        explanation: "The bar above 30°C reaches the 40-second gridline." },
      { prompt: "Based on the bar graph, what is the relationship between temperature and reaction time?", choices: ["As temperature increases, reaction time increases", "As temperature increases, reaction time decreases", "Reaction time stays the same regardless of temperature", "There is no clear pattern"], answer: 1,
        explanation: "Each bar gets shorter as temperature rises, from 80 seconds at 10°C down to 20 seconds at 50°C — an inverse relationship." }
    ]
  },
  {
    id: 'c3', category: 'sci', type: 'Data table',
    title: 'Plant Growth Over Four Weeks Under Different Light Conditions',
    html: `<div class="chart-display"><table class="data-table"><tr><th>Week</th><th>Full sunlight (cm)</th><th>Partial shade (cm)</th><th>No light (cm)</th></tr><tr><td>1</td><td>2</td><td>1</td><td>0.5</td></tr><tr><td>2</td><td>5</td><td>3</td><td>1</td></tr><tr><td>3</td><td>9</td><td>5</td><td>1.5</td></tr><tr><td>4</td><td>14</td><td>7</td><td>1.5</td></tr></table></div>`,
    questions: [
      { prompt: "How many centimeters did the partial-shade plant grow between Week 2 and Week 4?", choices: ["2 cm", "4 cm", "6 cm", "8 cm"], answer: 1,
        explanation: "The partial-shade plant measured 3 cm at Week 2 and 7 cm at Week 4. 7 − 3 = 4 cm of growth." },
      { prompt: "Which light condition shows the plant's growth nearly stopping by Week 4?", choices: ["Full sunlight", "Partial shade", "No light", "All three conditions"], answer: 2,
        explanation: "The no-light plant grew from 1 cm to 1.5 cm between Week 2 and Week 3, then stayed at 1.5 cm through Week 4 — essentially flat, while the other two conditions kept climbing." }
    ]
  },
  {
    id: 'c4', category: 'sci', type: 'Pie chart',
    title: "Energy Sources Used by a Small Power Plant",
    html: `<div class="chart-display"><div class="pie-wrap"><div class="pie" style="background:conic-gradient(#1a5c3a 0% 45%, #3d7a5c 45% 70%, #7fae93 70% 85%, #aecdbb 85% 95%, #d6e6dc 95% 100%)"></div><div class="legend"><div class="legend-row"><span class="legend-swatch" style="background:#1a5c3a"></span><span class="legend-label">Natural gas</span><span class="legend-val">45%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#3d7a5c"></span><span class="legend-label">Coal</span><span class="legend-val">25%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#7fae93"></span><span class="legend-label">Solar</span><span class="legend-val">15%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#aecdbb"></span><span class="legend-label">Wind</span><span class="legend-val">10%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#d6e6dc"></span><span class="legend-label">Hydro</span><span class="legend-val">5%</span></div></div></div></div>`,
    questions: [
      { prompt: "What percentage of the power plant's energy comes from renewable sources (solar, wind, and hydro combined)?", choices: ["20%", "25%", "30%", "35%"], answer: 2,
        explanation: "Solar (15%) + wind (10%) + hydro (5%) = 30% of total energy." },
      { prompt: "Which two energy sources combined make up exactly half of the plant's total energy?", choices: ["Natural gas and hydro", "Coal and solar", "Coal and wind", "Solar and wind"], answer: 0,
        explanation: "Natural gas (45%) + hydro (5%) = 50%. None of the other pairs add up to half." }
    ]
  },
  {
    id: 'c5', category: 'sci', type: 'Line graph',
    title: 'Rabbit Population in a Forest Over Six Years',
    html: `<div class="chart-display"><svg viewBox="0 0 460 260" xmlns="http://www.w3.org/2000/svg" class="chart-svg" role="img"><line x1="46" y1="226.0" x2="446" y2="226.0" class="gridline"/><text x="38" y="230.0" class="axis-label" text-anchor="end">0</text><line x1="46" y1="184.0" x2="446" y2="184.0" class="gridline"/><text x="38" y="188.0" class="axis-label" text-anchor="end">50</text><line x1="46" y1="142.0" x2="446" y2="142.0" class="gridline"/><text x="38" y="146.0" class="axis-label" text-anchor="end">100</text><line x1="46" y1="100.0" x2="446" y2="100.0" class="gridline"/><text x="38" y="104.0" class="axis-label" text-anchor="end">150</text><line x1="46" y1="58.0" x2="446" y2="58.0" class="gridline"/><text x="38" y="62.0" class="axis-label" text-anchor="end">200</text><line x1="46" y1="16.0" x2="446" y2="16.0" class="gridline"/><text x="38" y="20.0" class="axis-label" text-anchor="end">250</text><line x1="46" y1="16" x2="46" y2="226" class="axis-line"/><line x1="46" y1="226" x2="446" y2="226" class="axis-line"/><polyline points="46.0,142.0 126.0,100.0 206.0,16.0 286.0,58.0 366.0,100.0 446.0,142.0" fill="none" stroke="#1a5c3a" stroke-width="2.5"/><circle cx="46.0" cy="142.0" r="4" fill="#1a5c3a"/><text x="46.0" y="244" class="axis-label" text-anchor="middle">Yr 1</text><circle cx="126.0" cy="100.0" r="4" fill="#1a5c3a"/><text x="126.0" y="244" class="axis-label" text-anchor="middle">Yr 2</text><circle cx="206.0" cy="16.0" r="4" fill="#1a5c3a"/><text x="206.0" y="244" class="axis-label" text-anchor="middle">Yr 3</text><circle cx="286.0" cy="58.0" r="4" fill="#1a5c3a"/><text x="286.0" y="244" class="axis-label" text-anchor="middle">Yr 4</text><circle cx="366.0" cy="100.0" r="4" fill="#1a5c3a"/><text x="366.0" y="244" class="axis-label" text-anchor="middle">Yr 5</text><circle cx="446.0" cy="142.0" r="4" fill="#1a5c3a"/><text x="446.0" y="244" class="axis-label" text-anchor="middle">Yr 6</text><text x="46" y="11" class="axis-unit">rabbits</text></svg></div>`,
    questions: [
      { prompt: "In which year was the rabbit population at its highest?", choices: ["Year 2", "Year 3", "Year 4", "Year 5"], answer: 1,
        explanation: "The line peaks at Year 3, where the population reaches 250 rabbits — higher than any other year shown." },
      { prompt: "How much did the population decrease from its peak in Year 3 to Year 6?", choices: ["50", "100", "150", "200"], answer: 2,
        explanation: "The population was 250 at its Year 3 peak and dropped to 100 by Year 6. 250 − 100 = 150." }
    ]
  },
  {

        explanation: "The rate rose from 5% in Year 5 to 9% in Year 6, a 4-point jump — the steepest increase of any segment on the graph." }
    ]
  },
  {
    id: 'c8', category: 'ss', type: 'Pie chart',
    title: 'Federal Budget Allocation by Category (Sample Data)',
    html: `<div class="chart-display"><div class="pie-wrap"><div class="pie" style="background:conic-gradient(#c45a2a 0% 35%, #d97f4f 35% 60%, #e8a87c 60% 75%, #f3cca9 75% 85%, #faead8 85% 100%)"></div><div class="legend"><div class="legend-row"><span class="legend-swatch" style="background:#c45a2a"></span><span class="legend-label">Social programs</span><span class="legend-val">35%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#d97f4f"></span><span class="legend-label">Defense</span><span class="legend-val">25%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#e8a87c"></span><span class="legend-label">Interest on debt</span><span class="legend-val">15%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#f3cca9"></span><span class="legend-label">Education</span><span class="legend-val">10%</span></div><div class="legend-row"><span class="legend-swatch" style="background:#faead8"></span><span class="legend-label">Other</span><span class="legend-val">15%</span></div></div></div></div>`,
    questions: [

  {

is-label" text-anchor="middle">Election 4</text><text x="46" y="11" class="axis-unit">%</text></svg></div>`,

      { prompt: "How much higher was turnout in Election 4 than in Election 2?", choices: ["10 points", "15 points", "20 points", "25 points"], answer: 1,

let filter = 'all';
let activeList = charts;
let idx = 0;
let answers = {};
let catTotal = { sci: 0, ss: 0 };
let catCorrect = { sci: 0, ss: 0 };
let totalCorrect = 0;

function totalQuestions(list) { return list.reduce((s, c) => s + c.questions.length, 0); }

function applyFilter(f) {
  filter = f;
  activeList = f === 'all' ? charts : charts.filter(c => c.category === f);
  idx = 0;
  answers = {};
  catTotal = { sci: 0, ss: 0 };
  catCorrect = { sci: 0, ss: 0 };
  totalCorrect = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function render() {
  if (idx >= activeList.length) { renderScore(); return; }
  const c = activeList[idx];
  document.getElementById('progress-label').textContent = 'Chart ' + (idx + 1) + ' of ' + activeList.length;
  document.getElementById('progress-fill').style.width = ((idx / activeList.length) * 100) + '%';

  let html = '<div class="chart-card">';
  html += '<div class="chart-meta"><span class="cat-badge ' + c.category + '">' + (c.category === 'sci' ? 'Science' : 'Social Studies') + '</span><span class="chart-type-tag">' + c.type + '</span></div>';
  html += '<div class="chart-title">' + c.title + '</div>';
  html += c.html;

  c.questions.forEach((q, qi) => {
    const key = c.id + '-' + qi;
    const chosen = answers[key];
    html += '<div class="question-block"><div class="q-prompt">' + (qi + 1) + '. ' + q.prompt + '</div><div class="choices">';
    q.choices.forEach((ch, ci) => {
      let cls = 'choice-btn';
      if (chosen !== undefined) {
        if (ci === q.answer) cls += ' correct';
        else if (ci === chosen) cls += ' incorrect';
      }
      const disabledAttr = chosen !== undefined ? 'disabled' : '';
      html += '<button class="' + cls + '" ' + disabledAttr + ' onclick="answerQ(\'' + c.id + '\',' + qi + ',' + ci + ')">' + String.fromCharCode(65 + ci) + '. ' + ch + '</button>';
    });
    html += '</div>';
    if (chosen !== undefined) {
      const isCorrect = chosen === q.answer;
      html += '<div class="feedback ' + (isCorrect ? 'success' : 'danger') + '">' + (isCorrect ? 'Correct. ' : 'Not quite. ') + q.explanation + '</div>';
    }
    html += '</div>';
  });

  const allAnswered = c.questions.every((q, qi) => answers[c.id + '-' + qi] !== undefined);
  html += '<div class="nav-row"><button class="btn primary" ' + (allAnswered ? '' : 'disabled') + ' onclick="next()">' + (idx === activeList.length - 1 ? 'See your score' : 'Next chart') + ' →</button></div>';
  html += '</div>';

  document.getElementById('q-container').innerHTML = html;
}

function answerQ(cid, qi, ci) {
  const c = activeList.find(cc => cc.id === cid);
  const key = cid + '-' + qi;
  if (answers[key] !== undefined) return;
  answers[key] = ci;
  const correct = ci === c.questions[qi].answer;
  catTotal[c.category]++;
  if (correct) { totalCorrect++; catCorrect[c.category]++; }
  render();
}

function next() { idx++; render(); }

function renderScore() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = 'Chart ' + activeList.length + ' of ' + activeList.length + ' — complete';
  const total = totalQuestions(activeList);
  const pct = total > 0 ? Math.round((totalCorrect / total) * 100) : 0;
  const msg = pct >= 80 ? 'Strong work — charts and tables are being read accurately.' :
              pct >= 60 ? 'Good effort. Review the explanations for the ones you missed.' :
              'Keep practicing — slow down and trace each axis carefully before answering.';

  let breakdown = '';
  if (filter === 'all') {
    breakdown = '<div class="score-breakdown">' +
      '<div><div class="score-cat-name">Science</div><div class="score-cat-num" style="color:var(--sci)">' + (catTotal.sci > 0 ? catCorrect.sci + '/' + catTotal.sci : '—') + '</div></div>' +
      '<div><div class="score-cat-name">Social Studies</div><div class="score-cat-num" style="color:var(--ss)">' + (catTotal.ss > 0 ? catCorrect.ss + '/' + catTotal.ss : '—') + '</div></div>' +
      '</div>';
  }

  document.getElementById('q-container').innerHTML =
    '<div class="score-card">' +
    '<div class="score-big">' + totalCorrect + '/' + total + '</div>' +
    '<div class="score-sub">questions correct (' + pct + '%)</div>' +
    breakdown +
    '<p class="score-msg">' + msg + '</p>' +
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
    '<button class="btn primary" onclick="applyFilter(\'' + filter + '\')">Start over</button>' +
    '<button class="btn" onclick="window.location.href=\'index.html\'">Back to study hub →</button>' +
    '</div></div>';
}

document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));
applyFilter('all');
</script>
