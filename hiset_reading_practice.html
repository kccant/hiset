@media (max-width: 480px) { .passage-card { padding: 1.25rem; } }
</style>

        answer: 1,
        explanation: "Passage A states handwriting aids memory. Passage B doesn't dispute that handwriting in general has benefits over typing — it only disputes that cursive specifically, rather than printing, is necessary to get those benefits." },
      { prompt: "Which best describes a difference in how the two authors support their arguments?",
        choices: ["Passage A relies entirely on personal opinion, while Passage B cites no reasoning at all.", "Passage A emphasizes memory research and a cultural argument, while Passage B challenges that research's relevance and emphasizes limited classroom time.", "Passage A focuses only on classroom scheduling, while Passage B focuses only on family history.", "Both authors use identical evidence to reach opposite conclusions."],
        answer: 1,
        explanation: "Passage A's support comes from memory research plus a cultural/historical point; Passage B's support comes from questioning that research and weighing it against competing instructional priorities." }
    ]
  }
];

let filter = 'all';
let activeList = passages;
let idx = 0;
let answers = {};
let catTotal = { lit: 0, info: 0 };
let catCorrect = { lit: 0, info: 0 };
let totalCorrect = 0;

function totalQuestions(list) { return list.reduce((s, p) => s + p.questions.length, 0); }

function applyFilter(f) {
  filter = f;
  activeList = f === 'all' ? passages : passages.filter(p => p.category === f);
  idx = 0;
  answers = {};
  catTotal = { lit: 0, info: 0 };
  catCorrect = { lit: 0, info: 0 };
  totalCorrect = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function render() {
  if (idx >= activeList.length) { renderScore(); return; }
  const p = activeList[idx];
  document.getElementById('progress-label').textContent = 'Passage ' + (idx + 1) + ' of ' + activeList.length;
  document.getElementById('progress-fill').style.width = ((idx / activeList.length) * 100) + '%';

  let html = '<div class="passage-card">';
  html += '<div class="passage-meta"><span class="cat-badge ' + p.category + '">' + (p.category === 'lit' ? 'Literary' : 'Informational') + '</span><span class="genre-tag">' + p.genre + '</span></div>';
  html += '<div class="passage-title">' + p.title + '</div>';

  if (p.paired) {
    html += '<div class="part-label">' + p.partA.label + '</div><div class="passage-text">' + p.partA.text.map(t => '<p>' + t + '</p>').join('') + '</div>';
    html += '<div class="passage-divider"></div>';
    html += '<div class="part-label">' + p.partB.label + '</div><div class="passage-text">' + p.partB.text.map(t => '<p>' + t + '</p>').join('') + '</div>';
  } else {
    html += '<div class="passage-text">' + p.text.map(t => '<p>' + t + '</p>').join('') + '</div>';
  }

  p.questions.forEach((q, qi) => {
    const key = p.id + '-' + qi;
    const chosen = answers[key];
    html += '<div class="question-block"><div class="q-prompt">' + (qi + 1) + '. ' + q.prompt + '</div><div class="choices">';
    q.choices.forEach((c, ci) => {
      let cls = 'choice-btn';
      if (chosen !== undefined) {
        if (ci === q.answer) cls += ' correct';
        else if (ci === chosen) cls += ' incorrect';
      }
      const disabledAttr = chosen !== undefined ? 'disabled' : '';
      html += '<button class="' + cls + '" ' + disabledAttr + ' onclick="answerQ(\'' + p.id + '\',' + qi + ',' + ci + ')">' + String.fromCharCode(65 + ci) + '. ' + c + '</button>';
    });
    html += '</div>';
    if (chosen !== undefined) {
      const isCorrect = chosen === q.answer;
      html += '<div class="feedback ' + (isCorrect ? 'success' : 'danger') + '">' + (isCorrect ? 'Correct. ' : 'Not quite. ') + q.explanation + '</div>';
    }
    html += '</div>';
  });

  const allAnswered = p.questions.every((q, qi) => answers[p.id + '-' + qi] !== undefined);
  html += '<div class="nav-row"><button class="btn primary" ' + (allAnswered ? '' : 'disabled') + ' onclick="next()">' + (idx === activeList.length - 1 ? 'See your score' : 'Next passage') + ' →</button></div>';
  html += '</div>';

  document.getElementById('q-container').innerHTML = html;
}

function answerQ(pid, qi, ci) {
  const p = activeList.find(pp => pp.id === pid);
  const key = pid + '-' + qi;
  if (answers[key] !== undefined) return;
  answers[key] = ci;
  const correct = ci === p.questions[qi].answer;
  catTotal[p.category]++;
  if (correct) { totalCorrect++; catCorrect[p.category]++; }
  render();
}

function next() { idx++; render(); }

function renderScore() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = 'Passage ' + activeList.length + ' of ' + activeList.length + ' — complete';
  const total = totalQuestions(activeList);
  const pct = total > 0 ? Math.round((totalCorrect / total) * 100) : 0;
  const msg = pct >= 80 ? 'Strong work — comprehension and analysis skills are in good shape.' :
              pct >= 60 ? 'Good effort. Review the explanations for the ones you missed.' :
              'Keep practicing — try rereading missed passages before re-answering.';

  let breakdown = '';
  if (filter === 'all') {
    breakdown = '<div class="score-breakdown">' +
      '<div><div class="score-cat-name">Literary</div><div class="score-cat-num" style="color:var(--lit)">' + (catTotal.lit > 0 ? catCorrect.lit + '/' + catTotal.lit : '—') + '</div></div>' +
      '<div><div class="score-cat-name">Informational</div><div class="score-cat-num" style="color:var(--info)">' + (catTotal.info > 0 ? catCorrect.info + '/' + catTotal.info : '—') + '</div></div>' +
      '</div>';
  }

  document.getElementById('q-container').innerHTML =
    '<div class="score-card">' +
    '<div class="score-big">' + totalCorrect + '/' + total + '</div>' +
    '<div class="score-sub">questions correct (' + pct + '%)</div>' +
    breakdown +
    '<p class="score-msg">' + msg + '</p>' +
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
    '<button class="btn primary" onclick="applyFilter(\'' + filter + '\')">Start over</button>' +
    '<button class="btn" onclick="window.location.href=\'index.html\'">Back to study hub →</button>' +
    '</div></div>';
}

document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));
applyFilter('all');
</script>
</body>
</html>
